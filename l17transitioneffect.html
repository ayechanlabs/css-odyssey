<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition Effect</title>

    <link href="l17transitioneffect.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <div class="container">
        <div id="ease" class="square">DIV 1 ease</div>
    </div>

    <div class="container">
        <div id="linear" class="square">DIV 2 linear</div>
    </div>

    <div class="container">
        <div id="ease-in" class="square">DIV 3 ease-in</div>
    </div>

    <div class="container">
        <div id="ease-out" class="square">DIV 4 ease-out</div>
    </div>

    <div class="container">
        <div id="ease-in-out" class="square">DIV 5 ease-in-out</div>
    </div>

</body>
</html>
